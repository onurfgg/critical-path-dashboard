<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Path Method (CPM) Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent: #10b981; 
            --danger: #ef4444;
            --critical: #ef4444; 
        }

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 60px 20px; overflow-x: hidden;
        }

        /* --- KİŞİSEL LİNKLER --- */
        .social-links {
            position: absolute; top: 20px; left: 20px;
            display: flex; gap: 15px; z-index: 100;
        }
        .social-links a {
            color: var(--text-muted); font-size: 24px; transition: 0.3s;
        }
        .social-links a:hover { color: var(--primary); transform: scale(1.1); }

        .container {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            width: 100%; max-width: 900px; border-radius: 16px; padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(20px);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 42px; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));}
        .header h1 { margin: 0 0 10px 0; font-size: 26px; font-weight: 900; letter-spacing: -0.5px;}
        .header p { margin: 0; font-size: 13px; color: var(--text-muted); line-height: 1.6;}

        /* Görev Giriş Paneli */
        .task-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; padding-right: 5px;}
        .task-row {
            display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 10px;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border);
            align-items: center; transition: 0.2s;
        }
        .task-row:hover { border-color: rgba(255,255,255,0.3); }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;}
        .input-field {
            padding: 10px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 8px; font-size: 14px; font-weight: 600; color: white; outline: none; font-family: 'Inter'; text-transform: uppercase;
        }
        .input-field:focus { border-color: var(--primary); }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3);
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; margin-top: 15px;
        }
        .btn-remove:hover { background: var(--danger); color: white; }

        .action-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-add {
            flex: 1; background: transparent; color: var(--primary); border: 1px dashed var(--primary);
            padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-add:hover { background: rgba(99, 102, 241, 0.1); }
        
        .btn-calc {
            flex: 2; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;
            border: none; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); transition: 0.3s; text-transform: uppercase;
        }
        .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(99, 102, 241, 0.5); }

        /* Sonuç Paneli */
        #result-panel { display: none; flex-direction: column; gap: 20px; border-top: 1px solid var(--glass-border); padding-top: 30px; animation: slideDown 0.5s ease forwards; }

        /* AĞ ÇİZGESİ (GRAPH) ALANI */
        #network-canvas {
            width: 100%; height: 400px; background: rgba(0,0,0,0.4); 
            border-radius: 12px; border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(0,0,0,0.4));
            border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .summary-info h3 { margin: 0 0 5px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;}
        .summary-info .val { font-size: 32px; font-weight: 900; color: var(--critical); font-family: monospace;}
        .path-display { font-size: 18px; font-weight: 800; color: white; letter-spacing: 2px;}
        .path-display span { color: var(--text-muted); }

        /* Detaylı Veri Tablosu */
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        .data-table th { background: rgba(255,255,255,0.05); padding: 15px 10px; color: var(--text-muted); font-weight: 700; border-bottom: 1px solid var(--glass-border); text-transform: uppercase; font-size: 11px;}
        .data-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; font-family: monospace; font-size: 14px;}
        .data-table tr.critical-row { background: rgba(239, 68, 68, 0.05); }
        .data-table tr.critical-row td { color: var(--critical); }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; font-family: 'Inter';}
        .badge.crit { background: rgba(239, 68, 68, 0.2); color: var(--critical); }
        .badge.norm { background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        @keyframes slideDown { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) {
            .task-row { grid-template-columns: 1fr 1fr; }
            .btn-remove { grid-column: span 2; width: 100%; margin-top: 5px;}
            .summary-card { flex-direction: column; text-align: center; gap: 15px; }
            .social-links { position: relative; top: 0; left: 0; justify-content: center; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

    <div class="social-links">
        <a href="https://linkedin.com/in/onurfurkan" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://github.com/onurfgg" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
    </div>

    <div class="container">
        
        <div class="header">
            <i class="fa-solid fa-project-diagram"></i>
            <h1>Ağ Görselleştirmeli CPM Analizi</h1>
            <p>Proje yönetiminde düğümleri (node) hesaplayın. Algoritma dar boğazları bulur, ES/EF/LS/LF değerleriyle çizge teorisine döker.</p>
        </div>

        <div class="task-list" id="task-container">
            </div>

        <div class="action-buttons">
            <button class="btn-add" onclick="addTaskRow()"><i class="fa-solid fa-plus"></i> Aktivite Ekle</button>
            <button class="btn-calc" onclick="processCPM()">Ağı Çözümle ve Çiz <i class="fa-solid fa-play"></i></button>
        </div>

        <div id="result-panel">
            
            <div id="network-canvas"></div>

            <div class="summary-card">
                <div class="summary-info">
                    <h3>Toplam Proje Süresi</h3>
                    <div class="val" id="res-duration">0</div>
                </div>
                <div class="summary-info" style="text-align: right;">
                    <h3>Kritik Yol </h3>
                    <div class="path-display" id="res-path">-</div>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Aktivite</th>
                            <th>Süre</th>
                            <th title="En Erken Başlama">ES</th>
                            <th title="En Erken Bitiş">EF</th>
                            <th title="En Geç Başlama">LS</th>
                            <th title="En Geç Bitiş">LF</th>
                            <th title="Bolluk (Gecikme Payı)">Slack</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Fotoğraftaki orijinal ağ yapısı (A'dan L'ye)
        const defaultNetwork = [
            { id: 'A', dur: 4, pred: '' },
            { id: 'B', dur: 5, pred: 'A' },
            { id: 'C', dur: 2, pred: 'B' },
            { id: 'D', dur: 3, pred: 'C' },
            { id: 'F', dur: 4, pred: 'B' },
            { id: 'G', dur: 5, pred: 'F' },
            { id: 'H', dur: 4, pred: 'G' },
            { id: 'I', dur: 8, pred: 'F' },
            { id: 'J', dur: 3, pred: 'G, I' },
            { id: 'K', dur: 7, pred: 'D' },
            { id: 'L', dur: 2, pred: 'J' },
            { id: 'E', dur: 2, pred: 'H, K, L' }
        ];

        // Sayfa yüklendiğinde varsayılan düğümleri ekrana bas
        window.onload = () => {
            const container = document.getElementById('task-container');
            defaultNetwork.forEach(task => {
                container.appendChild(createRowHTML(task.id, task.dur, task.pred));
            });
        };

        function createRowHTML(id = '', dur = '', pred = '') {
            const row = document.createElement('div');
            row.className = 'task-row';
            row.innerHTML = `
                <div class="input-group">
                    <label>Aktivite ID</label>
                    <input type="text" class="input-field task-id" value="${id}">
                </div>
                <div class="input-group">
                    <label>Süre</label>
                    <input type="number" class="input-field task-dur" value="${dur}" min="0">
                </div>
                <div class="input-group">
                    <label>Öncüller</label>
                    <input type="text" class="input-field task-pred" value="${pred}">
                </div>
                <button class="btn-remove" onclick="this.parentElement.remove()" title="Sil"><i class="fa-solid fa-trash"></i></button>
            `;
            return row;
        }

        function addTaskRow() {
            document.getElementById('task-container').appendChild(createRowHTML());
        }

        // --- MATEMATİKSEL ALGORİTMA (CPM) ---
        function calculateCPM(activities) {
            let completedForward = 0;

            // 1. İLERİ GEÇİŞ (Forward Pass)
            while (completedForward < activities.length) {
                let progressed = false;
                activities.forEach(task => {
                    if (task.ef !== undefined) return; 
                    let canStart = true;
                    let maxEf = 0;
                    
                    for (let predId of task.predecessors) {
                        let pred = activities.find(a => a.id === predId);
                        if (!pred) throw new Error(`'${task.id}' için belirtilen '${predId}' öncülü bulunamadı!`);
                        if (pred.ef === undefined) { canStart = false; break; }
                        if (pred.ef > maxEf) maxEf = pred.ef; 
                    }
                    
                    if (canStart) {
                        task.es = maxEf;
                        task.ef = task.es + task.duration;
                        completedForward++;
                        progressed = true;
                    }
                });
                if (!progressed) throw new Error("Ağda mantıksal bir döngü tespit edildi!");
            }

            const projectDuration = Math.max(...activities.map(a => a.ef));

            // 2. GERİ GEÇİŞ (Backward Pass)
            let completedBackward = 0;
            activities.forEach(task => {
                let isPredecessor = activities.some(a => a.predecessors.includes(task.id));
                if (!isPredecessor) {
                    task.lf = projectDuration;
                    task.ls = task.lf - task.duration;
                    completedBackward++;
                }
            });

            while (completedBackward < activities.length) {
                activities.forEach(task => {
                    if (task.lf !== undefined) return;
                    let successors = activities.filter(a => a.predecessors.includes(task.id));
                    let allSuccessorsCalculated = successors.every(s => s.ls !== undefined);

                    if (allSuccessorsCalculated) {
                        let minLs = Math.min(...successors.map(s => s.ls));
                        task.lf = minLs;
                        task.ls = task.lf - task.duration;
                        completedBackward++;
                    }
                });
            }

            // 3. BOLLUK VE KRİTİK YOL TESPİTİ
            let criticalPath = [];
            activities.forEach(task => {
                task.slack = task.lf - task.ef;
                task.isCritical = (task.slack === 0);
                if (task.isCritical) criticalPath.push(task.id);
            });

            return { totalDuration: projectDuration, criticalPath: criticalPath, detailedNodes: activities };
        }

        // Dinamik SVG Düğüm Oluşturucu (Tıpkı yüklediğin görseldeki ES/EF/LS/LF yerleşimini sağlamak için)
        function generateNodeSVG(task) {
            const bgColor = task.isCritical ? '#ef4444' : '#6366f1';
            const borderColor = task.isCritical ? '#b91c1c' : '#4f46e5';

            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="90">
                    <text x="25" y="15" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">${task.es}</text>
                    <text x="75" y="15" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">${task.ef}</text>
                    
                    <rect x="10" y="20" width="80" height="45" rx="8" ry="8" fill="${bgColor}" stroke="${borderColor}" stroke-width="2"/>
                    
                    <text x="50" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">${task.id}</text>
                    <text x="50" y="58" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">${task.duration}</text>

                    <text x="25" y="82" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">${task.ls}</text>
                    <text x="75" y="82" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8" text-anchor="middle">${task.lf}</text>
                </svg>
            `;
            // SVG'yi data URI'ye çevir
            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        // --- GÖRSELLEŞTİRME (VIS.JS) ---
        function drawNetworkGraph(activities) {
            const nodesArray = [];
            const edgesArray = [];

            activities.forEach(task => {
                // Özel SVG düğümünü ekle
                nodesArray.push({
                    id: task.id,
                    shape: 'image',
                    image: generateNodeSVG(task),
                    size: 35 // Görüntü boyutunu optimize eder
                });

                // Okları (Edge) Oluştur
                task.predecessors.forEach(predId => {
                    let predNode = activities.find(a => a.id === predId);
                    
                    // İki düğüm de kritikse ve aralarında slack yoksa bu "Kritik Yol Okudur"
                    let isCriticalEdge = task.isCritical && predNode.isCritical && (task.es === predNode.ef);
                    
                    edgesArray.push({
                        from: predId,
                        to: task.id,
                        color: { color: isCriticalEdge ? '#ef4444' : '#64748b' },
                        width: isCriticalEdge ? 4 : 2, // Kritik yol daha kalın
                        arrows: 'to',
                        smooth: { type: 'cubicBezier', forceDirection: 'horizontal' }
                    });
                });
            });

            const container = document.getElementById('network-canvas');
            const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };
            
            const options = {
                layout: { 
                    hierarchical: { 
                        direction: 'LR', 
                        sortMethod: 'directed', 
                        levelSeparation: 120, // Sütunlar arası boşluk
                        nodeSpacing: 100 // Satırlar arası boşluk
                    } 
                },
                physics: false,
                interaction: { dragNodes: true, dragView: true, zoomView: true }
            };

            const network = new vis.Network(container, data, options);

            // GRAFİĞİN ÇİZİMİ BİTTİĞİNDE OTOMATİK OLARAK ORTALA VE SIĞDIR
            network.once("afterDrawing", function() {
                network.fit({
                    animation: {
                        duration: 800,
                        easingFunction: "easeOutQuad"
                    }
                });
            });
        }

        // --- ANA ÇALIŞTIRICI ---
        function processCPM() {
            const rows = document.querySelectorAll('.task-row');
            let activities = [];

            try {
                rows.forEach(row => {
                    let id = row.querySelector('.task-id').value.trim().toUpperCase();
                    let durStr = row.querySelector('.task-dur').value;
                    let predStr = row.querySelector('.task-pred').value;

                    if (!id) throw new Error("Aktivite ID'leri boş bırakılamaz.");
                    let duration = Number(durStr);
                    let predecessors = predStr ? predStr.split(',').map(s => s.trim().toUpperCase()).filter(s => s !== "") : [];

                    activities.push({ id, duration, predecessors });
                });

                // Algoritmayı Çalıştır
                const result = calculateCPM(activities);

                // Arayüzü Güncelle
                document.getElementById('result-panel').style.display = 'flex';
                
                // Grafiği Çiz (Küçük bir gecikme ekliyoruz ki result-panel tam açılsın, vis.js boyutları doğru hesaplasın)
                setTimeout(() => {
                    drawNetworkGraph(result.detailedNodes);
                }, 100);

                document.getElementById('res-duration').innerText = result.totalDuration;
                document.getElementById('res-path').innerHTML = result.criticalPath.join(' <span><i class="fa-solid fa-arrow-right-long"></i></span> ');

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                // A'dan Z'ye sırala
                result.detailedNodes.sort((a, b) => a.id.localeCompare(b.id));

                result.detailedNodes.forEach(task => {
                    let tr = document.createElement('tr');
                    if(task.isCritical) tr.className = 'critical-row';
                    
                    let statusBadge = task.isCritical 
                        ? `<span class="badge crit">Kritik</span>` 
                        : `<span class="badge norm">Normal</span>`;

                    tr.innerHTML = `
                        <td><strong>${task.id}</strong></td>
                        <td>${task.duration}</td>
                        <td>${task.es}</td>
                        <td>${task.ef}</td>
                        <td>${task.ls}</td>
                        <td>${task.lf}</td>
                        <td>${task.slack}</td>
                        <td>${statusBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                alert("Hata: " + error.message);
            }
        }
    </script>
</body>
</html>
